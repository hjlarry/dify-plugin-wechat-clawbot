version: 0.1.0
type: plugin
author: hejl
name: weixin_clawbot
label:
  en_US: Weixin ClawBot
  zh_Hans: 微信ClawBot
description:
  en_US: After binding Weixin, send messages to Dify through Weixin ClawBot.
  zh_Hans: 绑定微信后，通过微信ClawBot给 dify 发送消息。
icon: icon.jpg
created_at: 2026-03-23T00:00:00Z

resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
    endpoint:
      enabled: true
    app:
      enabled: true
    storage:
      enabled: true
      size: 1048576

plugins:
  endpoints:
    - provider/endpoint.yaml
  tools:
    - provider/weixin.yaml

meta:
  version: 0.0.1
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
